name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers the release build when you push a version tag (e.g. v1.0.0)
  workflow_dispatch: # Allows manual trigger from the Actions tab on GitHub

permissions:
  contents: write

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        shell: bash

      - name: Build Application
        run: |
          uv run --with pyinstaller --with pyproj pyinstaller EGSA2GE_Portable.spec
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-windows
          path: |
            dist/*.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Gather release files
        run: |
          mkdir -p release_files
          find artifacts -type f -exec cp {} release_files/ \;
          ls -R release_files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
